<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Dark aesthetic background gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2a" />
      <stop offset="50%" stop-color="#1e1e1e" />
      <stop offset="100%" stop-color="#121212" />
    </linearGradient>

    <!-- Emerald Glow Filter -->
    <filter id="emerald-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Intense Core Glow for Nodes -->
    <filter id="node-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base App Squircle -->
  <rect width="512" height="512" rx="120" fill="url(#bg-grad)" stroke="#333333" stroke-width="4"/>
  
  <!-- Subtle inner shadow/border ring for depth -->
  <rect width="504" height="504" x="4" y="4" rx="116" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="2"/>

  <!-- 
    The "Thread"
    A continuous line tracing a chat bubble shape.
    It unspools from the bottom left, forms the bubble, and ends in the center.
  -->
  
  <!-- Outer Glow Layer -->
  <path d="M 140 386 C 140 346, 180 306, 200 306 A 90 90 0 0 1 200 126 L 312 126 A 90 90 0 0 1 312 306 L 256 306" 
        fill="none" 
        stroke="#10b981" 
        stroke-width="28" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#emerald-glow)" 
        opacity="0.6" />

  <!-- Solid Emerald Core Layer -->
  <path d="M 140 386 C 140 346, 180 306, 200 306 A 90 90 0 0 1 200 126 L 312 126 A 90 90 0 0 1 312 306 L 256 306" 
        fill="none" 
        stroke="#10b981" 
        stroke-width="28" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- Bright Inner Highlight (The "Light" running through the thread) -->
  <path d="M 140 386 C 140 346, 180 306, 200 306 A 90 90 0 0 1 200 126 L 312 126 A 90 90 0 0 1 312 306 L 256 306" 
        fill="none" 
        stroke="#6ee7b7" 
        stroke-width="6" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        opacity="0.8" />

  <!-- The Nodes (Data points / Start & End of the thread) -->
  <circle cx="140" cy="386" r="10" fill="#ffffff" filter="url(#node-glow)" />
  <circle cx="256" cy="306" r="10" fill="#ffffff" filter="url(#node-glow)" />

</svg>